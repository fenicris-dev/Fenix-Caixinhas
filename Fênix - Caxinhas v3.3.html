<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#041273"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fênix Caixinhas"/>
<title>Fênix | Caixinhas</title>
<link rel="manifest" id="pwaManifest"/>
<link rel="apple-touch-icon" id="pwaIcon"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.dark-mode .app{background:#1c1c1e;color:#f5f5f7}
.dark-mode .card{background:#2c2c2e;border-color:#3a3a3c}
.dark-mode .kcard,.dark-mode .cxcard{background:#2c2c2e;border-color:#3a3a3c}
.dark-mode .nav{background:#1c1c1e;border-color:#3a3a3c}
.dark-mode .nb{color:#8e8e93}
.dark-mode .inp,.dark-mode .inp-sm{background:#2c2c2e;color:#f5f5f7;border-color:#3a3a3c}
.dark-mode .btn-s{color:#aeaeb2;border-color:#3a3a3c}
.dark-mode .lcard,.dark-mode .mbox{background:#2c2c2e}
.dark-mode .lfield{background:#2c2c2e;color:#f5f5f7;border-color:#3a3a3c}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1a1a2e;min-height:100vh}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column}
/* Header */
.hdr{background:#041273;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hlogo{width:32px;height:32px;border-radius:7px;object-fit:cover}
.htitle{color:#FFD600;font-size:15px;font-weight:700;margin-left:8px}
.hver{color:rgba(255,255,255,0.4);font-size:10px;margin-left:4px;align-self:flex-end;margin-bottom:1px}
.huser{color:rgba(255,255,255,0.65);font-size:12px;display:flex;align-items:center;gap:5px;cursor:pointer;background:none;border:none;padding:0}
/* Nav */
.nav{display:flex;border-bottom:1px solid #e5e5ea;background:#fff;flex-shrink:0}
.nb{flex:1;padding:9px 2px 7px;font-size:10px;color:#8e8e93;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px}
.nb.on{color:#041273;border-bottom-color:#041273;font-weight:700}
.nb i{font-size:20px}
/* Content */
.content{flex:1;overflow-y:auto;padding:1rem 1rem 2rem}
/* Cards */
.card{background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:1rem 1.125rem;margin-bottom:12px}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kcard{background:#f5f5f7;border-radius:10px;padding:.75rem 1rem}
.klabel{font-size:11px;color:#8e8e93;margin-bottom:3px}
.kval{font-size:19px;font-weight:700;color:#1a1a2e}
.ksub{font-size:10px;color:#aeaeb2;margin-top:1px}
/* Misc */
.sec{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:10px}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f2f2f7}
.row:last-child{border-bottom:none}
.pbar{height:6px;background:#e5e5ea;border-radius:99px;overflow:hidden;margin-top:5px}
.pbar-f{height:100%;border-radius:99px;transition:width .3s}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.b-ok{background:#d1fae5;color:#065f46}
.b-warn{background:#fef3c7;color:#92400e}
.b-err{background:#fee2e2;color:#991b1b}
/* Inputs */
.inp{font-size:14px;padding:8px 10px;border-radius:10px;border:1px solid #e5e5ea;background:#f5f5f7;color:#1a1a2e;outline:none;width:100%}
.inp:focus{border-color:#041273;background:#fff}
.inp-sm{font-size:13px;padding:6px 8px;border-radius:8px;border:1px solid #e5e5ea;background:#f5f5f7;color:#1a1a2e;outline:none;width:100%;text-align:right}
.inp-sm:focus{border-color:#041273;background:#fff}
.irow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.irow label{font-size:12px;color:#636366;min-width:85px;flex-shrink:0}
/* Buttons */
.btn-p{background:#0076CE;color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:4px}
.btn-p:active{background:#0062ad}
.btn-s{background:none;border:1px solid #c7c7cc;border-radius:8px;color:#636366;font-size:12px;cursor:pointer;padding:6px 10px;display:inline-flex;align-items:center;gap:4px}
.btn-s:active{background:#f5f5f7}
.btn-y{background:#FFD600;color:#041273;border:none;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.btn-y:active{background:#e6c000}
.btn-d{background:none;border:none;color:#c7c7cc;cursor:pointer;padding:4px;line-height:1;flex-shrink:0}
.btn-d:active{color:#e24b4a}
/* Tags */
.tag-f{font-size:9px;padding:2px 7px;background:#dbeafe;color:#1e40af;border-radius:99px;font-weight:700}
.tag-p{font-size:9px;padding:2px 7px;background:#d1fae5;color:#065f46;border-radius:99px;font-weight:700}
.opill{font-size:10px;padding:2px 7px;border-radius:99px;background:#ede9fe;color:#4c1d95;font-weight:600}
.wpill{font-size:10px;padding:2px 7px;border-radius:99px;background:#fee2e2;color:#991b1b;font-weight:600}
.gpill{font-size:10px;padding:2px 7px;border-radius:99px;background:#d1fae5;color:#065f46;font-weight:600}
.chip{background:#041273;color:#FFD600;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;white-space:nowrap}
/* cx-card */
.cxcard{background:#f9f9fb;border:1px solid #e5e5ea;border-radius:12px;padding:.875rem 1rem;margin-bottom:8px}
.cxicon{width:30px;height:30px;background:#041273;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cxicon i{font-size:15px;color:#FFD600}
/* Login */
.lwrap{display:flex;align-items:center;justify-content:center;flex:1;padding:2rem 1.25rem}
.lcard{background:#fff;border:1px solid #e5e5ea;border-radius:20px;padding:2rem 1.5rem;text-align:center;width:100%;max-width:340px}
.lfield{width:100%;margin-bottom:10px;font-size:14px;padding:10px 12px;border-radius:10px;border:1px solid #e5e5ea;background:#f5f5f7;color:#1a1a2e;outline:none}
.lfield:focus{border-color:#041273;background:#fff}
.aerr{background:#fee2e2;color:#991b1b;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px;display:none}
/* Modal */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.mbox{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.mtitle{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:1.25rem}
.minfo{font-size:12px;color:#636366;margin-bottom:12px;background:#f5f5f7;padding:8px 10px;border-radius:8px}
/* Footer */
.footer{text-align:center;font-size:10px;color:#aeaeb2;padding:.875rem 1rem;flex-shrink:0;border-top:1px solid #f2f2f7}
.footer a{color:#8e8e93;text-decoration:none}
.safe{color:#059669!important}
.danger{color:#dc2626!important}
.warn{color:#d97706!important}
</style>
</head>

function tentarSincronizar() {

// FIRESTORE LOAD / SAVE
// ═══════════════════════════════════════════
function docRef(name) {
  var empId = empresaAtual ? empresaAtual.id : 'default';
  return db.collection('users').doc(currentUid).collection('empresas').doc(empId).collection('dados').doc(name);
}
function empresasRef() {
  return db.collection('users').doc(currentUid).collection('empresas');
}

async function carregarEmpresas() {
  try {
    var snap = await empresasRef().get();
    var empresas = [];
    snap.forEach(function(doc) { empresas.push({id: doc.id, nome: doc.data().nome||doc.id}); });
    if (empresas.length === 0) {
      await empresasRef().doc('default').set({nome: 'Fenix Solucoes', criadaEm: new Date().toISOString()});
      empresas = [{id: 'default', nome: 'Fenix Solucoes'}];
    }
    empresaAtual = empresas[0];
    renderSeletorEmpresas(empresas);
  } catch(e) {
    console.error('empresas error:', e);
    empresaAtual = {id: 'default', nome: 'Fenix Solucoes'};
  }
}

function renderSeletorEmpresas(empresas) {
  var sel = document.getElementById('seletorEmpresa');
  if (!sel) return;
  sel.innerHTML = empresas.map(function(e){
    return '<option value="' + e.id + '">' + e.nome + '</option>';
  }).join('') + '<option value="__nova__">+ Nova empresa</option>';
  if (empresaAtual) sel.value = empresaAtual.id;
}

async function trocarEmpresa(id) {
  if (id === '__nova__') {
    var nome = prompt('Nome da nova empresa:');
    if (!nome) { var emp2 = await getEmpresas(); renderSeletorEmpresas(emp2); return; }
    var newId = 'emp_' + Date.now();
    await empresasRef().doc(newId).set({nome: nome.trim(), criadaEm: new Date().toISOString()});
    empresaAtual = {id: newId, nome: nome.trim()};
    await loadAll();
    var emps = await getEmpresas();
    renderSeletorEmpresas(emps);
    return;
  }
  var emps2 = await getEmpresas();
  var emp3 = emps2.find(function(e){return e.id===id;});
  if (emp3) { empresaAtual = emp3; await loadAll(); }
}

async function getEmpresas() {
  var snap = await empresasRef().get();
  var arr = [];
  snap.forEach(function(doc){arr.push({id:doc.id,nome:doc.data().nome||doc.id});});
  return arr;
}

async function loadAll() {
  try {
    var cdSnap = await docRef('config').get();
    if (cdSnap.exists) {
      cfg = cdSnap.data();
      // Garantir campos novos em registros antigos
      if (!cfg.despesasFixas) cfg.despesasFixas = DEFAULT_CFG.despesasFixas;
      if (!cfg.proporcionais) cfg.proporcionais = DEFAULT_CFG.proporcionais;
      if (!cfg.origens) cfg.origens = [];
      if (!cfg.dividas) cfg.dividas = [];
      if (!cfg.recorrentes) cfg.recorrentes = [];
      cfg.despesasFixas.forEach(function(c) { if (!c.pagamentos) c.pagamentos = []; if (!c.saldo) c.saldo = 0; });
      cfg.proporcionais.forEach(function(p) { if (!p.retiradas) p.retiradas = []; if (!p.saldo) p.saldo = 0; });
    } else {
      cfg = JSON.parse(JSON.stringify(DEFAULT_CFG));
    }
    var ldSnap = await docRef('lancamentos').get();
    lancamentos = ldSnap.exists ? (ldSnap.data().items || []) : [];
  } catch(e) {
    console.error('loadAll error:', e);
    cfg = JSON.parse(JSON.stringify(DEFAULT_CFG));
    lancamentos = [];
  }
  try{processarRecorrentes();}catch(e){}
  checkBadges();
  applyDark();
  goTab(0);
}

function showSaveStatus(msg, color) {
  var el = document.getElementById('saveStatus');
  if (!el) return;
  el.textContent = msg; el.style.background = color || '#059669'; el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 2500);

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async function() {
    if (!currentUid) return;
    try {
try{localStorage.setItem('fenix_cfg',JSON.stringify(cfg));localStorage.setItem('fenix_lanc',JSON.stringify(lancamentos));}catch(e){}
      if(!modoOffline&&currentUid!=='local'){
        try {
          await docRef('config').set(cfg);
          await docRef('lancamentos').set({ items: lancamentos });
          showSaveStatus('Dados salvos na nuvem', '#059669');
        } catch(e) {
          console.error('Firestore:', e.code, e.message);

        }
      } else {

      }
    } catch(e) { console.error('save error:', e); }
  }, 1200);
}

function goTab(n) {
  for (var i = 0; i < 6; i++) {
    document.getElementById('tab' + i).style.display = i === n ? 'block' : 'none';
    document.getElementById('nb' + i).classList.toggle('on', i === n);
  }
  if (n === 0) renderDash();
  else if (n === 1) renderLanc();
  else if (n === 2) renderCaixinhas();
  else if (n === 3) renderHist();
  else if (n === 4) renderMetas();
  else if (n === 5) renderDRE();
  checkBadges();
}

// ═══════════════════════════════════════════
// CÁLCULOS
// ═══════════════════════════════════════════
function totalMes(key) {
  return lancamentos.filter(function(l) { return l.mes === key; })
    .reduce(function(s, l) {
      if (l.tipo === 'emprestimo') return s;
      return s + Number(l.liquido != null ? l.liquido : l.valor || 0);
    }, 0);
}
function totalMesBruto(key) {
  return lancamentos.filter(function(l) { return l.mes === key; })
    .reduce(function(s, l) { return s + Number(l.valor || 0); }, 0);
}
function totalAno(y) {
  return lancamentos.filter(function(l) { return l.mes && l.mes.startsWith(String(y)); })
    .reduce(function(s, l) { return s + Number(l.valor || 0); }, 0);
}
function totalFixasAporte() {
  // Total aportado nas fixas neste mês (% do faturamento)
  var vb = totalMes(curKey());
  return (cfg.despesasFixas || []).reduce(function(s, c) {
    return s + vb * (Number(c.pct || 0) / 100);
  }, 0);
}
function tetoFixa(c) { return Number(c.valRef || 0) * 12; }
function excedFixa(c) { var t = tetoFixa(c); return t > 0 ? Math.max(0, Number(c.saldo || 0) - t) : 0; }
function temExcedente() { return (cfg.despesasFixas || []).some(function(c) { return excedFixa(c) > 0; }); }
function totalExcedentes() {
  return (cfg.despesasFixas || []).reduce(function(s, c) { return s + excedFixa(c); }, 0);
}
function calcProp(total) {
  return (cfg.proporcionais || []).map(function(c) {
    return { id: c.id, nome: c.nome, pct: Number(c.pct || 0), valor: total * (Number(c.pct || 0) / 100) };
  });
}
function aporteMesCx(cxId, mesKey) {
  return lancamentos.filter(function(l) { return l.mes === mesKey; })
    .reduce(function(s, l) {
      var d = (l.dist || []).find(function(x) { return x.id === cxId; });
      return s + (d ? d.valor : 0);
    }, 0);
}

// ═══════════════════════════════════════════
// REDISTRIBUIR EXCEDENTES
// ═══════════════════════════════════════════
function redistribuirExcedentes() {
  var tot = totalExcedentes();
  if (tot <= 0) return;
  var destNomes = ['Fator de Crescimento', 'Manutenção de Viaturas', 'Pró-Labore'];
  var parte = tot / destNomes.length;
  // Pró-Labore está nas fixas
  destNomes.forEach(function(nome) {
    var cx = (cfg.proporcionais || []).find(function(p) { return p.nome === nome; });
    if (cx) cx.saldo = Number(cx.saldo || 0) + parte;
    else {
      // Pode ser Pró-Labore (nas fixas)
      var cf = (cfg.despesasFixas || []).find(function(c) { return c.nome === nome; });
      if (cf) cf.saldo = Number(cf.saldo || 0) + parte;
    }
  });
  // Reduzir saldo das fixas ao teto
  (cfg.despesasFixas || []).forEach(function(c) {
    var t = tetoFixa(c);
    if (t > 0 && Number(c.saldo || 0) > t) c.saldo = t;
  });
  scheduleSave();
  renderCaixinhas();
  renderDash();
  alert('Redistribuído! R$ ' + fmtBRL(parte) + ' para cada caixinha.');
}

function prevDist() {
  var v = parseFloat(document.getElementById('lVal').value) || 0;
  var pe = document.getElementById('prevEl');
  var pr = document.getElementById('prevRows');
  if (v <= 0) { pe.style.display = 'none'; return; }
  pe.style.display = 'block';
  var fixas = (cfg.despesasFixas || []).filter(function(c) { return Number(c.pct || 0) > 0; });
  var props = calcProp(v).filter(function(d) { return d.pct > 0; });
  var tF = fixas.reduce(function(s, c) { return s + v * (Number(c.pct || 0) / 100); }, 0);
  var html = '';
  fixas.forEach(function(c) {
    html += '<div class="row"><span style="font-size:13px;color:#636366"><span class="tag-f">fixo</span> ' + c.nome + ' (' + fmtPct(c.pct) + ')</span><span style="font-size:13px;font-weight:600">' + fmtBRL(v * c.pct / 100) + '</span></div>';
  });
  props.forEach(function(d) {
    html += '<div class="row"><span style="font-size:13px;color:#636366"><span class="tag-p">%</span> ' + d.nome + ' (' + fmtPct(d.pct) + ')</span><span style="font-size:13px;font-weight:600">' + fmtBRL(d.valor) + '</span></div>';
  });
  var sl = v - tF;
  html += '<div class="row"><span style="font-size:13px;font-weight:700">Saldo após fixas</span><span style="font-size:13px;font-weight:700;color:' + (sl >= 0 ? '#059669' : '#dc2626') + '">' + fmtBRL(sl) + '</span></div>';
  pr.innerHTML = html;
}

function salvarLanc() {
  var v = parseFloat(document.getElementById('lVal').value) || 0;
  if (v <= 0) return;
  var orig = document.getElementById('lOrigNova').value.trim() || document.getElementById('lOrig').value;
  var data = document.getElementById('lData').value;
  var obs  = document.getElementById('lObs').value.trim();
  var mes  = data.slice(0, 7);
  if (orig && !(cfg.origens || []).includes(orig)) cfg.origens = (cfg.origens || []).concat([orig]);
  var dist = calcProp(v);
  // Acumular saldo nas proporcionais
  dist.forEach(function(d) {
    var cx = (cfg.proporcionais || []).find(function(p) { return p.id === d.id; });
    if (cx) cx.saldo = Number(cx.saldo || 0) + d.valor;
  });
  // Acumular saldo nas fixas
  (cfg.despesasFixas || []).forEach(function(c) {
    c.saldo = Number(c.saldo || 0) + v * (Number(c.pct || 0) / 100);
  });
  lancamentos.push({ id: genId(), valor: v, origem: orig, data: data, obs: obs, mes: mes, dist: dist });
  sortAlfa(cfg.proporcionais);
  scheduleSave();
  document.getElementById('lVal').value = '';
  document.getElementById('lOrigNova').value = '';
  document.getElementById('prevEl').style.display = 'none';
  goTab(0);
}

function addOrig() {
  var n = prompt('Nome da nova origem:');
  if (!n) return;
  cfg.origens = (cfg.origens || []).concat([n.trim()]);
  scheduleSave(); renderLanc();
}
function rmOrig(i) {
  cfg.origens.splice(i, 1);
  scheduleSave(); renderLanc();
}

// ═══════════════════════════════════════════
// CAIXINHAS
// ═══════════════════════════════════════════
function renderCaixinhas() {
  var fix   = cfg.despesasFixas || [];
  var props = cfg.proporcionais || [];
  var tPct  = props.reduce(function(s, c) { return s + Number(c.pct || 0); }, 0);
  var vbMes = totalMes(curKey());
  var pColor = tPct > 100 ? '#dc2626' : tPct === 100 ? '#059669' : '#0076CE';

  var html = '';

  // ── DESPESAS FIXAS ──
  html += '<div class="card">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
  html += '<div class="sec" style="margin-bottom:0">Despesas Fixas</div>';
  html += '<button class="btn-y" onclick="addFixa()"><i class="ti ti-plus"></i> Nova</button></div>';
  html += '<p style="font-size:11px;color:#8e8e93;margin-bottom:12px">Valor de referência + % do faturamento → acumula saldo → teto de 12×</p>';

  fix.forEach(function(c, i) {
    var teto   = tetoFixa(c);
    var exc    = excedFixa(c);
    var sldPct = teto > 0 ? Math.min(100, (c.saldo || 0) / teto * 100) : 0;
    var corBar = exc > 0 ? '#dc2626' : sldPct > 80 ? '#d97706' : '#041273';
    html += '<div class="cxcard">';
    // Linha nome + icone + remover
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html += '<div class="cxicon"><i class="' + (c.icone || 'ti-box') + '"></i></div>';
    html += '<input type="text" value="' + c.nome + '" class="inp" style="flex:1;padding:6px 8px;font-size:13px;font-weight:600" placeholder="Nome" oninput="updFixaNome(' + i + ',this.value)"/>';
    html += '<button class="btn-d" onclick="rmFixa(' + i + ')"><i class="ti ti-x" style="font-size:14px"></i></button>';
    html += '</div>';
    // Campos valRef + pct
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
    html += '<div><div style="font-size:10px;color:#8e8e93;margin-bottom:3px">' + (c.isProlabore ? 'Meta mensal R$' : 'Valor ref. R$') + '</div>';
    html += '<input type="number" class="inp-sm" value="' + (c.valRef || '') + '" placeholder="0,00" min="0" step="0.01" inputmode="decimal" oninput="updFixaValRef(' + i + ',this.value)"/></div>';
    html += '<div><div style="font-size:10px;color:#8e8e93;margin-bottom:3px">% do faturamento</div>';
    html += '<div style="display:flex;align-items:center;gap:3px">';
    html += '<input type="number" class="inp-sm" value="' + (c.pct || '') + '" placeholder="0" min="0" max="100" step="0.1" inputmode="decimal" oninput="updFixaPct(' + i + ',this.value)"/>';
    html += '<span style="font-size:12px;color:#8e8e93">%</span></div>';
    if (vbMes > 0 && Number(c.pct || 0) > 0) {
      html += '<div style="font-size:10px;color:#636366;margin-top:2px">' + fmtBRL(vbMes * Number(c.pct) / 100) + ' este mês</div>';
    }
    html += '</div>';
    if (!c.isProlabore) {
      html += '<div style="grid-column:span 2"><div style="font-size:10px;color:#8e8e93;margin-bottom:3px">Teto (12×)</div>';
      html += '<div style="font-size:13px;font-weight:600;color:#1a1a2e">' + fmtBRL(teto) + '</div></div>';
    }
    html += '</div>';
    // Saldo + barra + botão pagar
    html += '<div style="border-top:1px solid #e5e5ea;padding-top:8px">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">';
    html += '<div><div style="font-size:10px;color:#8e8e93">Saldo acumulado</div>';
    html += '<div style="font-size:16px;font-weight:700;color:#041273">' + fmtBRL(c.saldo || 0) + '</div>';
    if (teto > 0) html += '<div style="font-size:10px;color:#aeaeb2">' + fmtPct(sldPct) + ' do teto</div>';
    html += '</div>';
    html += '<button class="btn-y" onclick="abrirModalPagar(\'' + c.id + '\')"><i class="ti ti-currency-dollar"></i> Pagar</button>';
    html += '</div>';
    html += '<div class="pbar"><div class="pbar-f" style="width:' + sldPct + '%;background:' + corBar + '"></div></div>';
    if (exc > 0) html += '<div style="font-size:11px;color:#dc2626;font-weight:600;margin-top:4px">⚠ Excedente: ' + fmtBRL(exc) + ' acima do teto</div>';
    if ((c.pagamentos || []).length > 0) {
      var ult = c.pagamentos[c.pagamentos.length - 1];
      html += '<div style="font-size:10px;color:#8e8e93;margin-top:4px">Último pgto: ' + fmtBRL(ult.valor) + ' em ' + new Date(ult.data + 'T12:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }) + '</div>';
    }
    html += '</div></div>';
  });

  // Total aportado + aviso excedente
  html += '<div class="row" style="border-top:1px solid #e5e5ea;margin-top:4px"><span style="font-size:13px;font-weight:700">Aportado este mês</span>';
  html += '<span style="font-size:14px;font-weight:700;color:#041273">' + fmtBRL(totalFixasAporte()) + '</span></div>';
  if (temExcedente()) {
    html += '<div style="margin-top:10px;background:#fee2e2;border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between">';
    html += '<span style="font-size:12px;color:#991b1b;font-weight:600">💰 Excedente total: ' + fmtBRL(totalExcedentes()) + '</span>';
    html += '<button class="btn-y" style="font-size:11px;padding:5px 10px" onclick="redistribuirExcedentes()">Redistribuir</button></div>';
  }
  html += '</div>';

  // ── PROPORCIONAIS ──
  html += '<div class="card">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">';
  html += '<div class="sec" style="margin-bottom:0">Distribuição Proporcional</div>';
  html += '<div style="display:flex;align-items:center;gap:8px">';
  html += '<span style="font-size:13px;font-weight:700;color:' + pColor + '">' + fmtPct(tPct) + '</span>';
  html += '<button class="btn-y" onclick="addProp()"><i class="ti ti-plus"></i> Nova</button></div></div>';
  html += '<p style="font-size:11px;color:#8e8e93;margin-bottom:12px">% de cada recebimento — acumula saldo — permite retiradas</p>';
  if (tPct > 100) html += '<div style="font-size:11px;color:#dc2626;font-weight:600;margin-bottom:8px">⚠ Soma ultrapassa 100%</div>';
  if (tPct < 100 && props.length > 0) html += '<div style="font-size:11px;color:#8e8e93;margin-bottom:8px">' + fmtPct(100 - tPct) + ' não alocado</div>';

  props.forEach(function(c, i) {
    var mt = Number(c.meta || 0);
    var sldPct2 = mt > 0 ? Math.min(100, (c.saldo || 0) / mt * 100) : 0;
    var apM = aporteMesCx(c.id, curKey());
    var apP = aporteMesCx(c.id, prevKey());
    var delta = apP > 0 ? ((apM - apP) / apP * 100) : null;

    html += '<div class="cxcard">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html += '<div class="cxicon"><i class="ti ti-wallet"></i></div>';
    html += '<input type="text" value="' + c.nome + '" class="inp" style="flex:1;padding:6px 8px;font-size:13px;font-weight:600" placeholder="Nome" oninput="updPropNome(' + i + ',this.value)"/>';
    html += '<button class="btn-d" onclick="rmProp(' + i + ')"><i class="ti ti-x" style="font-size:14px"></i></button>';
    html += '</div>';

    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
    html += '<div><div style="font-size:10px;color:#8e8e93;margin-bottom:3px">% por recebimento</div>';
    html += '<div style="display:flex;align-items:center;gap:3px">';
    html += '<input type="number" class="inp-sm" style="font-weight:700;color:#041273" min="0" max="100" step="1" value="' + (c.pct || 0) + '" oninput="updPropPct(' + i + ',this.value)"/>';
    html += '<span style="font-size:12px;color:#8e8e93">%</span></div></div>';
    html += '<div><div style="font-size:10px;color:#8e8e93;margin-bottom:3px">Meta R$</div>';
    html += '<input type="number" class="inp-sm" min="0" step="10" value="' + (c.meta || '') + '" placeholder="0" oninput="updPropMeta(' + i + ',this.value)" inputmode="decimal"/></div>';
    html += '</div>';

    // Saldo + evolução
    html += '<div style="border-top:1px solid #e5e5ea;padding-top:8px">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
    html += '<div><div style="font-size:10px;color:#8e8e93">Saldo acumulado</div>';
    html += '<div style="font-size:16px;font-weight:700;color:#041273">' + fmtBRL(c.saldo || 0) + '</div>';
    if (mt > 0) html += '<div style="font-size:10px;color:#aeaeb2">' + fmtPct(sldPct2) + ' da meta</div>';
    html += '</div>';
    html += '<button class="btn-y" onclick="abrirModalRetirada(\'' + c.id + '\')"><i class="ti ti-arrow-up"></i> Retirar</button>';
    html += '<button class="btn-s" style="margin-top:4px;width:100%;justify-content:center" onclick="abrirTransf(\\\'' + c.id + '\\\')"><i class="ti ti-arrows-exchange"></i> Transferir</button>';
    html += '</div>';
    if (mt > 0) { html += '<div class="pbar" style="margin-bottom:8px"><div class="pbar-f" style="width:' + sldPct2 + '%;background:#041273"></div></div>'; }
    // Evolução mês anterior vs atual
    html += '<div style="display:flex;gap:6px">';
    html += '<div style="flex:1;background:#f5f5f7;border-radius:8px;padding:6px 8px;text-align:center">';
    html += '<div style="font-size:9px;color:#8e8e93;margin-bottom:2px">Mês anterior</div>';
    html += '<div style="font-size:12px;font-weight:600;color:#636366">' + fmtBRL(apP) + '</div></div>';
    html += '<div style="flex:1;background:#f5f5f7;border-radius:8px;padding:6px 8px;text-align:center">';
    html += '<div style="font-size:9px;color:#8e8e93;margin-bottom:2px">Este mês</div>';
    html += '<div style="font-size:12px;font-weight:600;color:#041273">' + fmtBRL(apM) + '</div>';
    if (delta !== null) html += '<div style="font-size:10px;font-weight:700;color:' + (delta >= 0 ? '#059669' : '#dc2626') + '">' + (delta >= 0 ? '+' : '') + delta.toFixed(0) + '%</div>';
    html += '</div></div>';
    html += '</div></div>';
  });

  if (props.length === 0) html += '<div style="font-size:13px;color:#aeaeb2;padding:8px 0;text-align:center">Nenhuma caixinha criada ainda</div>';
  html += '</div>';

  document.getElementById('tab2').innerHTML = html;
}

function updFixaNome(i, v) { cfg.despesasFixas[i].nome = v; scheduleSave(); }
function updFixaValRef(i, v) { cfg.despesasFixas[i].valRef = parseFloat(v) || 0; scheduleSave(); }
function updFixaPct(i, v) { cfg.despesasFixas[i].pct = parseFloat(v) || 0; scheduleSave(); }
function addFixa() {
  cfg.despesasFixas.push({ id: genId(), nome: '', icone: 'ti-box', valRef: 0, pct: 0, saldo: 0, pagamentos: [] });
  sortAlfa(cfg.despesasFixas); scheduleSave(); renderCaixinhas();
}
function rmFixa(i) {
  if (!confirm('Remover esta despesa fixa?')) return;
  cfg.despesasFixas.splice(i, 1); scheduleSave(); renderCaixinhas();
}
function updPropNome(i, v) { cfg.proporcionais[i].nome = v; scheduleSave(); }
function updPropPct(i, v) { cfg.proporcionais[i].pct = parseFloat(v) || 0; scheduleSave(); renderCaixinhas(); }
function updPropMeta(i, v) { cfg.proporcionais[i].meta = parseFloat(v) || 0; scheduleSave(); }
function addProp() {
  cfg.proporcionais.push({ id: genId(), nome: '', pct: 0, meta: 0, saldo: 0, retiradas: [] });
  sortAlfa(cfg.proporcionais); scheduleSave(); renderCaixinhas();
}
function rmProp(i) {
  if (!confirm('Remover esta caixinha? O saldo será perdido.')) return;
  cfg.proporcionais.splice(i, 1); scheduleSave(); renderCaixinhas();
}

// ═══════════════════════════════════════════
// MODAL PAGAR
// ═══════════════════════════════════════════
function abrirModalPagar(id) {
  modalPagarId = id;
  var c = (cfg.despesasFixas || []).find(function(x) { return x.id === id; });
  if (!c) return;
  document.getElementById('mPagarTitulo').textContent = 'Pagar — ' + c.nome;
  document.getElementById('mPagarInfo').textContent = 'Saldo: ' + fmtBRL(c.saldo || 0) + ' | Teto (12×): ' + fmtBRL(tetoFixa(c));
  document.getElementById('mPagarData').value = todayStr();
  document.getElementById('mPagarValor').value = c.valRef || '';
  document.getElementById('mPagarObs').value = '';
  document.getElementById('modalPagar').style.display = 'flex';
}
function fecharModalPagar() { document.getElementById('modalPagar').style.display = 'none'; modalPagarId = null; }
function confirmarPagar() {
  var c = (cfg.despesasFixas || []).find(function(x) { return x.id === modalPagarId; });
  if (!c) return;
  var v = parseFloat(document.getElementById('mPagarValor').value) || 0;
  if (v <= 0) { alert('Informe o valor pago.'); return; }
  if (v > Number(c.saldo || 0)) { alert('Saldo insuficiente: ' + fmtBRL(c.saldo)); return; }
  if (!c.pagamentos) c.pagamentos = [];
  c.pagamentos.push({ id: genId(), data: document.getElementById('mPagarData').value, valor: v, obs: document.getElementById('mPagarObs').value.trim(), saldoAntes: Number(c.saldo) });
  c.saldo = Number(c.saldo) - v;
  scheduleSave(); fecharModalPagar(); renderCaixinhas();
  if (temExcedente()) {
    if (confirm('💰 Há excedentes (' + fmtBRL(totalExcedentes()) + ') acima do teto de 12 meses.\n\nRedistribuir agora para Pró-Labore, Fator de Crescimento e Manutenção de Viaturas?')) {
      redistribuirExcedentes();
    }
  }
}

  document.getElementById('mRetData').value = todayStr();
  document.getElementById('mRetValor').value = '';
  document.getElementById('mRetMotivo').value = '';
  document.getElementById('mRetDestino').value = '';

function fecharModalRetirada() { document.getElementById('modalRetirada').style.display = 'none'; modalRetId = null; }
function confirmarRetirada() {
  var c = (cfg.proporcionais || []).find(function(x) { return x.id === modalRetId; });

}

// ═══════════════════════════════════════════
// HISTÓRICO
// ═══════════════════════════════════════════
function renderHist() {
  var t = document.getElementById('tab3');
  var modo = t._modo || 'lanc';
  var meses = [];
  lancamentos.forEach(function(l) { if (l.mes && !meses.includes(l.mes)) meses.push(l.mes); });
  meses.sort(function(a, b) { return b.localeCompare(a); });
  var sel = t._filtro || '';

  var todasRet = [];
  (cfg.proporcionais || []).forEach(function(cx) {
    (cx.retiradas || []).forEach(function(r) { todasRet.push(Object.assign({}, r, { caixinha: cx.nome })); });
  });
  todasRet.sort(function(a, b) { return b.data.localeCompare(a.data); });

  var todosPag = [];
  (cfg.despesasFixas || []).forEach(function(cx) {
    (cx.pagamentos || []).forEach(function(p) { todosPag.push(Object.assign({}, p, { caixinha: cx.nome })); });
  });
  todosPag.sort(function(a, b) { return b.data.localeCompare(a.data); });

  var html = '<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">';
  html += '<button class="btn-s" style="' + (modo === 'lanc' ? 'border-color:#041273;color:#041273;font-weight:700' : '') + '" onclick="document.getElementById(\'tab3\')._modo=\'lanc\';renderHist()">Recebimentos</button>';
  html += '<button class="btn-s" style="' + (modo === 'pag' ? 'border-color:#059669;color:#059669;font-weight:700' : '') + '" onclick="document.getElementById(\'tab3\')._modo=\'pag\';renderHist()">Pagamentos</button>';
  html += '<button class="btn-s" style="' + (modo === 'ret' ? 'border-color:#dc2626;color:#dc2626;font-weight:700' : '') + '" onclick="document.getElementById(\'tab3\')._modo=\'ret\';renderHist()">Retiradas</button>';
  html += '</div>';

  if (modo === 'lanc') {
    html += '<div class="card">';
    html += '<div style="margin-bottom:12px"><select id="fMes" onchange="document.getElementById(\'tab3\')._filtro=this.value;renderHist()" style="font-size:13px;padding:7px 10px;border-radius:10px;border:1px solid #e5e5ea;background:#f5f5f7;color:#1a1a2e;width:100%">';
    html += '<option value="">Todos os meses</option>';
    meses.forEach(function(m) {
      var parts = m.split('-');
      var d = new Date(parts[0], parts[1] - 1, 1);
      html += '<option value="' + m + '"' + (m === sel ? ' selected' : '') + '>' + d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }) + '</option>';
    });
    html += '</select></div>';
    var fl = sel ? lancamentos.filter(function(l) { return l.mes === sel; }) : lancamentos.slice();
    fl.sort(function(a, b) { return b.data.localeCompare(a.data); });
    if (fl.length === 0) {
      html += '<div style="font-size:13px;color:#aeaeb2;padding:8px 0">Nenhum lançamento</div>';
    } else {
      var tot = fl.reduce(function(s, l) { return s + Number(l.valor || 0); }, 0);
      fl.forEach(function(l) {
        html += '<div class="row" style="align-items:flex-start">';
        html += '<div style="flex:1"><div style="font-size:13px;font-weight:700">' + fmtBRL(l.valor) + '</div>';
        html += '<div style="font-size:11px;color:#8e8e93;margin-top:2px">';
        if (l.data) html += new Date(l.data + 'T12:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
        if (l.origem) html += ' <span class="opill">' + l.origem + '</span>';
        html += '</div>';
        if (l.obs) html += '<div style="font-size:10px;color:#aeaeb2">' + l.obs + '</div>';
        html += '</div>';
        html += '<button class="btn-d" onclick="rmLanc(\'' + l.id + '\')"><i class="ti ti-trash" style="font-size:15px"></i></button>';
        html += '</div>';
      });
      html += '<div class="row"><span style="font-size:13px;font-weight:700">Total</span><span style="font-size:14px;font-weight:700;color:#041273">' + fmtBRL(tot) + '</span></div>';
    }
    html += '</div>';

  } else if (modo === 'pag') {
    html += '<div class="card">';
    if (todosPag.length === 0) {
      html += '<div style="font-size:13px;color:#aeaeb2;padding:8px 0">Nenhum pagamento registrado</div>';
    } else {
      todosPag.forEach(function(p) {
        html += '<div class="row" style="align-items:flex-start"><div style="flex:1">';
        html += '<div style="font-size:13px;font-weight:700;color:#059669">- ' + fmtBRL(p.valor) + '</div>';
        html += '<div style="font-size:11px;color:#8e8e93;margin-top:2px"><span class="gpill">' + p.caixinha + '</span>';
        if (p.data) html += ' · ' + new Date(p.data + 'T12:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
        html += '</div>';
        if (p.obs) html += '<div style="font-size:10px;color:#aeaeb2">' + p.obs + '</div>';
        html += '</div></div>';
      });
    }
    html += '</div>';

  } else {
    html += '<div class="card">';
    if (todasRet.length === 0) {
      html += '<div style="font-size:13px;color:#aeaeb2;padding:8px 0">Nenhuma retirada registrada</div>';

function processarRecorrentes() {
  var hoje=new Date(), mes=hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0');
  (cfg.recorrentes||[]).forEach(function(r){
    if(!r.ativo)return;
    if(lancamentos.some(function(l){return l.recorrenteId===r.id&&l.mes===mes;}))return;
    if(hoje.getDate()<r.dia)return;
    var dl=mes+'-'+String(r.dia).padStart(2,'0');
    var liq=r.tipo==='venda'?Math.max(0,r.valor-(r.custo||0)):r.valor;
    var dist=calcProp(liq);
    dist.forEach(function(d){var cx=(cfg.proporcionais||[]).find(function(p){return p.id===d.id;});if(cx)cx.saldo=Number(cx.saldo||0)+d.valor;});
    (cfg.despesasFixas||[]).forEach(function(c){c.saldo=Number(c.saldo||0)+liq*(Number(c.pct||0)/100);});
    lancamentos.push({id:genId(),valor:r.valor,liquido:liq,tipo:r.tipo,custo:r.custo||0,origem:r.origem,data:dl,obs:'[Recorrente] '+r.nome,mes:mes,dist:dist,recorrenteId:r.id});
  });
  scheduleSave();
}

function pagarDivida(i){
  var d=cfg.dividas[i];if(!d)return;
  var sd=Number(d.valor||0)-Number(d.pago||0);
  var v=parseFloat(prompt('Valor pago (saldo: '+fmtBRL(sd)+'):'));
  if(!v||v<=0)return;
  d.pago=Number(d.pago||0)+Math.min(v,sd);

function abrirTransf(id) {
  _transfId = id;
  var cx = (cfg.proporcionais||[]).find(function(p){return p.id===id;});
  if (!cx) return;
  var outras = (cfg.proporcionais||[]).filter(function(p){return p.id!==id;});
  if (!outras.length) { alert('Nao ha outras caixinhas.'); return; }

  var overlay = document.createElement('div');
  overlay.id = 'mTransf';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center';
  overlay.addEventListener('click', function(e){ if(e.target===overlay) fecharTransf(); });

  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:480px';

  var titulo = document.createElement('div');
  titulo.style.cssText = 'font-size:16px;font-weight:700;margin-bottom:1rem';
  titulo.textContent = 'Transferir de ' + cx.nome;

  info.textContent = 'Saldo disponivel: ' + fmtBRL(cx.saldo||0);

  var lblVal = document.createElement('label');
  lblVal.style.cssText = 'font-size:12px;color:#636366;display:block;margin-bottom:4px';
  lblVal.textContent = 'Valor R$';
  var inpVal = document.createElement('input');
  inpVal.type = 'number'; inpVal.id = 'transfVal'; inpVal.className = 'inp';
  inpVal.min = '0'; inpVal.step = '0.01'; inpVal.placeholder = '0,00';
  inpVal.setAttribute('inputmode','decimal');
  var wrapVal = document.createElement('div');
  wrapVal.style.marginBottom = '10px';
  wrapVal.appendChild(lblVal); wrapVal.appendChild(inpVal);

  var lblDest = document.createElement('label');
  lblDest.style.cssText = 'font-size:12px;color:#636366;display:block;margin-bottom:4px';
  lblDest.textContent = 'Destino';
  var selDest = document.createElement('select');
  selDest.id = 'transfDest'; selDest.className = 'inp';
  outras.forEach(function(p){
    var opt = document.createElement('option');
    opt.value = p.id; opt.textContent = p.nome + ' (' + fmtBRL(p.saldo||0) + ')';
    selDest.appendChild(opt);
  });
  var wrapDest = document.createElement('div');
  wrapDest.style.marginBottom = '14px';
  wrapDest.appendChild(lblDest); wrapDest.appendChild(selDest);

  var btnOk = document.createElement('button');
  btnOk.className = 'btn-p'; btnOk.textContent = 'Confirmar';
  btnOk.addEventListener('click', confirmarTransf);

  var btnCan = document.createElement('button');
  btnCan.className = 'btn-s';
  btnCan.style.cssText = 'width:100%;margin-top:8px;justify-content:center';
  btnCan.textContent = 'Cancelar';
  btnCan.addEventListener('click', fecharTransf);

  box.appendChild(titulo); box.appendChild(info);
  box.appendChild(wrapVal); box.appendChild(wrapDest);
  box.appendChild(btnOk); box.appendChild(btnCan);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}
function confirmarTransf() {
  var v = parseFloat(document.getElementById('transfVal').value)||0;
  var destId = document.getElementById('transfDest').value;
  var orig = (cfg.proporcionais||[]).find(function(p){return p.id===_transfId;});
  var dest = (cfg.proporcionais||[]).find(function(p){return p.id===destId;});
  if (!orig||!dest) return;
  if (v<=0){alert('Informe um valor.');return;}
  if (v>Number(orig.saldo||0)){alert('Saldo insuficiente: '+fmtBRL(orig.saldo));return;}
  orig.saldo = Number(orig.saldo||0)-v;
  dest.saldo = Number(dest.saldo||0)+v;
  scheduleSave(); fecharTransf(); renderCaixinhas();
  showSaveStatus('Transferencia realizada!','#059669');
}

function diasRestantes(dataStr) {
  if (!dataStr) return null;
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var alvo = new Date(dataStr+'T12:00'); alvo.setHours(0,0,0,0);
  return Math.ceil((alvo-hoje)/86400000);
}

function abrirImportCSV() {
  var overlay = document.createElement('div');
  overlay.id = 'modalCSV';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center';
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto';
  var t = document.createElement('div');
  t.style.cssText = 'font-size:16px;font-weight:700;margin-bottom:.5rem';
  t.textContent = 'Importar Extrato CSV';
  var info = document.createElement('p');
  info.style.cssText = 'font-size:12px;color:#636366;margin-bottom:1rem';
  info.textContent = 'Arquivo CSV do banco. Colunas: Data, Descricao, Valor.';
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.csv,.txt';
  inp.style.cssText = 'width:100%;margin-bottom:12px;font-size:13px';
  inp.addEventListener('change', function(e){ processarCSV(e.target.files[0], box); });
  var btnC = document.createElement('button');
  btnC.className = 'btn-s';
  btnC.style.cssText = 'width:100%;margin-top:8px;justify-content:center';
  btnC.textContent = 'Cancelar';
  btnC.addEventListener('click', function(){ overlay.remove(); });
  box.appendChild(t); box.appendChild(info); box.appendChild(inp); box.appendChild(btnC);
  overlay.appendChild(box);

function processarCSV(file, box) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result;
    var sep = text.indexOf('\n') > -1 ? '\r\n' : '\n';
    var lines = text.split(sep).filter(function(l){ return l.trim(); });
    var dados = lines.slice(1).map(function(l){
      var cols = l.split(/[,;]/).map(function(c){ return c.replace(/"/g,'').trim(); });
      return { data: cols[0]||'', desc: cols[1]||cols[2]||'', valor: cols[2]||cols[3]||'' };
    }).filter(function(d){ return d.valor && !isNaN(parseFloat(d.valor.replace(',','.'))); });

    var preview = document.createElement('div');
    preview.style.marginTop = '12px';
    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:13px;font-weight:600;margin-bottom:8px';
    hdr.textContent = 'Preview — ' + dados.length + ' lancamentos';
    preview.appendChild(hdr);
    var origs = cfg.origens || [];
    var mostra = dados.slice(0,20);
    mostra.forEach(function(d, i){
      var v = parseFloat(d.valor.replace(',','.'));
      var row = document.createElement('div');
      row.style.cssText = 'border:1px solid #e5e5ea;border-radius:8px;padding:8px;margin-bottom:6px;font-size:12px';
      var top = document.createElement('div');
      top.style.cssText = 'display:flex;justify-content:space-between;margin-bottom:4px';
      var dt = document.createElement('span'); dt.style.color='#636366'; dt.textContent=d.data||'--';
      var vl = document.createElement('span'); vl.style.fontWeight='600';
      vl.style.color = v>=0?'#059669':'#dc2626'; vl.textContent=fmtBRL(Math.abs(v));
      top.appendChild(dt); top.appendChild(vl);
      var desc = document.createElement('div'); desc.style.cssText='color:#1a1a2e;margin-bottom:4px'; desc.textContent=d.desc;
      var sel = document.createElement('select');
      sel.setAttribute('data-idx', i);
      sel.style.cssText = 'width:100%;font-size:12px;padding:4px;border-radius:6px;border:1px solid #e5e5ea';
      var optIgn = document.createElement('option'); optIgn.value=''; optIgn.textContent='Ignorar';
      sel.appendChild(optIgn);
      origs.forEach(function(o){
        var opt = document.createElement('option'); opt.value=o; opt.textContent=o; sel.appendChild(opt);
      });
      var optNovo = document.createElement('option'); optNovo.value='__novo__'; optNovo.textContent='+ Nova origem';
      sel.appendChild(optNovo);
      row.appendChild(top); row.appendChild(desc); row.appendChild(sel);
      preview.appendChild(row);
    });

    var btnImp = document.createElement('button');
    btnImp.className = 'btn-p'; btnImp.style.marginTop='12px';
    btnImp.textContent = 'Importar Selecionados';
    btnImp.addEventListener('click', function(){
      var sels = preview.querySelectorAll('select');
      var count = 0;
      sels.forEach(function(sel, i){
        var origem = sel.value;
        if (!origem || origem==='__novo__') return;
        var d = dados[i];
        var v = Math.abs(parseFloat(d.valor.replace(',','.')));
        var dataF = d.data;
        try {
          var pts = d.data.split(/[\/\-\.]/);
          if (pts.length===3) {
            dataF = pts[0].length===4 ? d.data : pts[2]+'-'+pts[1].padStart(2,'0')+'-'+pts[0].padStart(2,'0');
          }
        } catch(er){}
        var mes = dataF.slice(0,7);
        var dist = calcProp(v);
        dist.forEach(function(dd){ var cx=(cfg.proporcionais||[]).find(function(p){return p.id===dd.id;}); if(cx) cx.saldo=Number(cx.saldo||0)+dd.valor; });
        (cfg.despesasFixas||[]).forEach(function(c){ c.saldo=Number(c.saldo||0)+v*(Number(c.pct||0)/100); });
        lancamentos.push({id:genId(),valor:v,liquido:v,tipo:'receita',custo:0,origem:origem,data:dataF,obs:d.desc,mes:mes,dist:dist});
        count++;
      });
      scheduleSave();
      document.getElementById('modalCSV').remove();
      showSaveStatus(count + ' lancamento(s) importado(s)!','#059669');
      goTab(0);
    });
    preview.appendChild(btnImp);
    box.appendChild(preview);
  };
  reader.readAsText(file, 'UTF-8');
}

async function gerarLinkCompartilhamento() {
  if (!db||!currentUid) return;
  try {
    var token = genId()+genId()+genId();
    var empId = empresaAtual ? empresaAtual.id : 'default';
    var empNome = empresaAtual ? empresaAtual.nome : 'Fenix';
    var expira = new Date(Date.now()+30*24*60*60*1000).toISOString();
    await db.collection('compartilhamentos').doc(token).set({
      uid: currentUid, empresaId: empId, empresaNome: empNome,
      criadoEm: new Date().toISOString(), expiraEm: expira
    });
    var link = window.location.href.split('?')[0] + '?share=' + token;
    if (navigator.clipboard) {
      await navigator.clipboard.writeText(link);
      alert('Link copiado! Valido por 30 dias.');
    } else {
      prompt('Copie o link:', link);
    }
  } catch(e) { alert('Erro: '+e.message); }
}

async function verificarModoCompartilhamento() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('share');
  if (!token) return false;
  try {
    var snap = await db.collection('compartilhamentos').doc(token).get();
    if (!snap.exists) { alert('Link invalido ou expirado.'); return false; }
    var data = snap.data();
    if (data.expiraEm && new Date(data.expiraEm) < new Date()) { alert('Link expirado.'); return false; }
    currentUid = data.uid;
    empresaAtual = {id: data.empresaId, nome: data.empresaNome};
    var cdSnap = await docRef('config').get();
    cfg = cdSnap.exists ? cdSnap.data() : JSON.parse(JSON.stringify(DEFAULT_CFG));
    if(!cfg.despesasFixas) cfg.despesasFixas=DEFAULT_CFG.despesasFixas;
    if(!cfg.proporcionais) cfg.proporcionais=DEFAULT_CFG.proporcionais;
    if(!cfg.origens) cfg.origens=[];
    if(!cfg.dividas) cfg.dividas=[];
    if(!cfg.recorrentes) cfg.recorrentes=[];
    var ldSnap = await docRef('lancamentos').get();
    lancamentos = ldSnap.exists ? (ldSnap.data().items||[]) : [];
    document.getElementById('pgLogin').style.display = 'none';
    document.getElementById('pgApp').style.cssText = 'display:flex;flex:1;flex-direction:column';
    var banner = document.getElementById('bannerOffline');
    if (banner) {
      banner.style.display='flex';
      var sp=banner.querySelector('span'); if(sp) sp.textContent='Visualizacao — '+data.empresaNome;
      var bt=banner.querySelector('button'); if(bt) bt.style.display='none';
    }
    window._readOnly = true;
    applyDark(); checkBadges(); goTab(0);
    return true;
  } catch(e) { console.error('share error:',e); return false; }
}
